<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搬家待辦清單</title>
<style>
  :root{
    --bg:#eef5f5; --card:#ffffff; --ink:#1f3437; --sub:#6f8a8c;
    --accent:#2b9da3; --accent2:#46c0b8; --line:#dcebeb; --shadow:0 8px 26px rgba(40,120,125,.10);
    --done:#36b27a; --done-bg:#e4f5ed;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,"PingFang TC","Noto Sans TC","Segoe UI",sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:0 18px 96px}

  header{position:relative;overflow:hidden;color:#fff;padding:40px 18px 50px;text-align:center;
        background:linear-gradient(135deg,#1f8e94 0%,#2b9da3 45%,#46c0b8 100%)}
  header::before{content:"";position:absolute;top:-90px;right:-60px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.10)}
  header::after{content:"";position:absolute;bottom:-120px;left:-50px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.07)}
  header .inner{position:relative;z-index:1;max-width:520px;margin:0 auto}
  .pageswitch{position:absolute;top:16px;right:16px;z-index:2}
  .pageswitch a{font-size:12.5px;font-weight:700;color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:5px;
        background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:7px 13px;backdrop-filter:blur(4px)}
  .pageswitch a:hover{background:rgba(255,255,255,.28)}
  .pageswitch a svg{width:14px;height:14px}
  @media(max-width:480px){.pageswitch{position:static;margin:0 auto 4px;display:flex;justify-content:center}}
  header h1{margin:0;font-size:27px;letter-spacing:1px;display:flex;gap:10px;align-items:center;justify-content:center;font-weight:800}
  header h1 svg{width:27px;height:27px}
  header .sub{font-size:13.5px;opacity:.92;margin-top:5px}
  .prog{margin-top:20px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:14px 16px;backdrop-filter:blur(4px)}
  .prog-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;opacity:.95}
  .prog-top b{font-size:21px;font-weight:800}
  .prog-bar{height:9px;border-radius:99px;background:rgba(255,255,255,.25);margin:9px 0 0;overflow:hidden}
  .prog-fill{height:100%;border-radius:99px;background:#fff;width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}

  .bar{position:sticky;top:0;z-index:40;background:rgba(238,245,245,.92);backdrop-filter:blur(10px);
        border-bottom:1px solid var(--line);padding:11px 18px;display:flex;gap:10px;align-items:center}
  .navlink{font-size:13px;font-weight:700;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:5px;
        background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 14px}
  .navlink:hover{background:var(--done-bg)}
  .navlink svg{width:15px;height:15px}
  .addbtn{margin-left:auto;border:none;background:linear-gradient(135deg,#2b9da3,#46c0b8);color:#fff;font:inherit;font-weight:700;font-size:13px;
        padding:9px 16px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;box-shadow:0 3px 10px rgba(43,157,163,.32);transition:.18s}
  .addbtn:hover{transform:translateY(-1px)}
  .addbtn svg{width:15px;height:15px}

  .list{margin-top:22px;display:flex;flex-direction:column;gap:12px}
  .todo{position:relative;display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
        border-radius:16px;padding:16px 16px 16px 18px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s,border-color .18s;
        overflow:hidden;animation:rise .34s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .todo::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent)}
  .todo.done::before{background:var(--done)}
  .todo:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(40,120,125,.16);border-color:#bfe0e0}
  .check{width:25px;height:25px;border:2px solid #cfe0e0;border-radius:8px;flex-shrink:0;margin-top:1px;
        display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:.15s;background:#fff}
  .check:hover{border-color:var(--done)}
  .todo.done .check{background:var(--done);border-color:var(--done)}
  .check svg{width:16px;height:16px;opacity:0;transform:scale(.5);transition:.15s}
  .todo.done .check svg{opacity:1;transform:scale(1)}
  .num{width:28px;height:28px;border-radius:9px;background:var(--done-bg);color:var(--accent);font-weight:800;font-size:13px;
        display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:0}
  .todo .body{flex:1;min-width:0}
  .todo .task{font-weight:700;font-size:16px;padding-right:30px;letter-spacing:.2px}
  .todo.done .task{text-decoration:line-through;text-decoration-color:var(--sub);color:var(--sub)}
  .todo .note{font-size:13px;color:#5a7173;margin-top:7px;background:#f3f9f9;border:1px solid #e4f0f0;border-radius:10px;padding:8px 10px;line-height:1.55;white-space:pre-wrap}
  .edit{position:absolute;top:13px;right:13px;border:none;background:none;color:#aebebe;cursor:pointer;padding:4px;border-radius:8px;transition:.15s}
  .edit:hover{background:var(--done-bg);color:var(--accent)}
  .edit svg{width:16px;height:16px}
  .todo.done{opacity:.62}

  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:30px}
  #status{text-align:center;color:var(--sub);font-size:13px;padding:40px}

  #modal{position:fixed;inset:0;z-index:100;background:rgba(15,45,47,.45);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
  #modal.show{display:flex}
  @media(min-width:560px){#modal{align-items:center;padding:18px}}
  .sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:440px;padding:22px;box-shadow:0 -10px 40px rgba(0,0,0,.2);animation:slideup .28s cubic-bezier(.2,.7,.3,1)}
  @media(min-width:560px){.sheet{border-radius:20px;animation:pop .22s ease}}
  @keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  @keyframes pop{from{transform:scale(.96);opacity:.6}to{transform:none;opacity:1}}
  .sheet h3{margin:0 0 16px;font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  .sheet h3 svg{width:19px;height:19px;color:var(--accent)}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:5px}
  .field input,.field textarea{width:100%;font:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;background:#f7fbfb;color:var(--ink);transition:.15s}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .field textarea{min-height:64px;resize:vertical}
  .actions{display:flex;gap:9px;margin-top:20px;align-items:center}
  .actions button{font:inherit;font-weight:800;font-size:14px;padding:12px 16px;border-radius:13px;cursor:pointer;border:none;transition:.15s}
  .btn-save{background:linear-gradient(135deg,#2b9da3,#46c0b8);color:#fff;flex:1;box-shadow:0 3px 10px rgba(43,157,163,.3)}
  .btn-save:hover{transform:translateY(-1px)}
  .btn-cancel{background:#eef3f3;color:var(--ink)}
  .btn-del{background:#fdecea;color:#d05a52;padding:12px 13px}
  .btn-del svg{width:16px;height:16px;vertical-align:-3px}
</style>
</head>
<body>
<header>
  <div class="pageswitch"><a href="index.html"><i data-lucide="house-plus"></i>新家佈置清單</a></div>
  <div class="inner">
    <h1><i data-lucide="truck"></i> 搬家待辦清單</h1>
    <div class="sub">雲端同步 · 點圈圈打勾完成</div>
    <div class="prog">
      <div class="prog-top"><span>完成進度</span><b id="pct">0%</b></div>
      <div class="prog-bar"><div class="prog-fill" id="pfill"></div></div>
    </div>
  </div>
</header>

<div class="bar">
  <button class="addbtn" id="addbtn"><i data-lucide="plus"></i>新增待辦</button>
</div>

<div class="wrap">
  <div id="status">載入中…</div>
  <div class="list" id="list"></div>
  <footer>搬家待辦 · 資料同步於 Supabase</footer>
</div>

<div id="modal">
  <div class="sheet">
    <h3 id="mtitle"><i data-lucide="plus"></i>新增待辦</h3>
    <div class="field"><label>待辦事項</label><input id="f-task" placeholder="例：找搬家公司、預約搬家"></div>
    <div class="field"><label>備註（選填）</label><textarea id="f-note" placeholder="日期、電話、報價、提醒…"></textarea></div>
    <div class="actions">
      <button class="btn-save" id="m-save">儲存</button>
      <button class="btn-cancel" id="m-cancel">取消</button>
      <button class="btn-del" id="m-del" style="display:none"><i data-lucide="trash-2"></i></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const SB_URL='https://veasxxuveykxycstcnfn.supabase.co';
  const SB_KEY='sb_publishable_O_1jnHO_5OunHwByeJDHdg_s_sztSkk';
  const API=SB_URL+'/rest/v1/moving_todos';
  const H={ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' };

  let ITEMS=[], editingId=null;
  function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

  function iconFor(t){
    if(/合約|租/.test(t))return 'file-text';
    if(/房東|續租|說/.test(t))return 'message-square';
    if(/搬家公司|預約|搬/.test(t))return 'truck';
    if(/地板|修補|油漆|清潔|修/.test(t))return 'hammer';
    return 'check-circle';
  }

  async function load(){
    try{
      const r=await fetch(API+'?select=*&order=sort_order,id',{headers:H});
      if(!r.ok) throw new Error(r.status);
      ITEMS=await r.json();
      document.getElementById('status').style.display='none';
      render();
    }catch(e){
      document.getElementById('status').innerHTML='⚠️ 連線失敗：'+e.message+'<br>請先在 Supabase 建立 moving_todos 資料表';
    }
  }

  function card(it,i){
    return `<div class="todo ${it.done?'done':''}" data-id="${it.id}">
      <div class="check" data-act="toggle"><i data-lucide="check"></i></div>
      <div class="body">
        <div class="task">${esc(it.task)}</div>
        ${it.note?`<div class="note">${esc(it.note)}</div>`:''}
      </div>
      <button class="edit" data-act="edit"><i data-lucide="pencil"></i></button>
    </div>`;
  }

  function render(){
    document.getElementById('list').innerHTML = ITEMS.length
      ? ITEMS.map(card).join('')
      : `<div style="text-align:center;color:var(--sub);padding:30px">尚無待辦，點右上「新增待辦」開始 ✏️</div>`;
    bind(); if(window.lucide) lucide.createIcons(); renderProg();
  }
  function renderProg(){
    const total=ITEMS.length, d=ITEMS.filter(i=>i.done).length, pct=total?Math.round(d/total*100):0;
    document.getElementById('pct').textContent=pct+'%';
    document.getElementById('pfill').style.width=pct+'%';
  }
  function bind(){
    document.querySelectorAll('.todo').forEach(el=>{
      const id=+el.dataset.id;
      el.querySelector('[data-act="toggle"]').addEventListener('click',e=>{e.stopPropagation();toggle(id,el);});
      el.querySelector('[data-act="edit"]').addEventListener('click',e=>{e.stopPropagation();openEdit(id);});
    });
  }
  async function toggle(id,el){
    const it=ITEMS.find(x=>x.id===id); if(!it)return;
    const nv=!it.done; it.done=nv; el.classList.toggle('done',nv); renderProg();
    const r=await fetch(API+'?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({done:nv})});
    if(!r.ok){ it.done=!nv; el.classList.toggle('done',!nv); renderProg(); alert('同步失敗，請重試'); }
  }

  const modal=document.getElementById('modal');
  function openAdd(){ editingId=null;
    document.getElementById('mtitle').innerHTML='<i data-lucide="plus"></i>新增待辦';
    document.getElementById('f-task').value=''; document.getElementById('f-note').value='';
    document.getElementById('m-del').style.display='none'; modal.classList.add('show'); if(window.lucide)lucide.createIcons();
  }
  function openEdit(id){ const it=ITEMS.find(x=>x.id===id); if(!it)return; editingId=id;
    document.getElementById('mtitle').innerHTML='<i data-lucide="pencil"></i>編輯待辦';
    document.getElementById('f-task').value=it.task; document.getElementById('f-note').value=it.note||'';
    document.getElementById('m-del').style.display='inline-flex'; modal.classList.add('show'); if(window.lucide)lucide.createIcons();
  }
  function close(){ modal.classList.remove('show'); }
  async function save(){
    const payload={ task:document.getElementById('f-task').value.trim(), note:document.getElementById('f-note').value.trim()||null };
    if(!payload.task){ alert('請輸入待辦事項'); return; }
    let r;
    if(editingId){ r=await fetch(API+'?id=eq.'+editingId,{method:'PATCH',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(payload)}); }
    else { payload.sort_order=(Math.max(0,...ITEMS.map(i=>i.sort_order||0))+1);
      r=await fetch(API,{method:'POST',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(payload)}); }
    if(!r.ok){ alert('儲存失敗：'+r.status); return; }
    const row=(await r.json())[0];
    if(editingId){ const i=ITEMS.findIndex(x=>x.id===editingId); ITEMS[i]={...ITEMS[i],...row}; } else { ITEMS.push(row); }
    close(); render();
  }
  async function del(){
    if(!editingId||!confirm('確定刪除這個待辦？'))return;
    const r=await fetch(API+'?id=eq.'+editingId,{method:'DELETE',headers:H});
    if(!r.ok){ alert('刪除失敗：'+r.status); return; }
    ITEMS=ITEMS.filter(x=>x.id!==editingId); close(); render();
  }

  document.getElementById('addbtn').addEventListener('click',openAdd);
  document.getElementById('m-save').addEventListener('click',save);
  document.getElementById('m-cancel').addEventListener('click',close);
  document.getElementById('m-del').addEventListener('click',del);
  modal.addEventListener('click',e=>{if(e.target===modal)close();});

  if(window.lucide) lucide.createIcons();
  load();
</script>
</body>
</html>
