<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新家佈置清單</title>
<style>
  :root{
    --bg:#eef5f5; --card:#ffffff; --ink:#1f3437; --sub:#6f8a8c;
    --accent:#2b9da3; --accent2:#46c0b8; --line:#dcebeb; --shadow:0 8px 26px rgba(40,120,125,.10);
    --own:#94a3a4; --buy:#2b9da3; --decide:#e0a82e; --ordered:#36b27a; --got:#5b8def;
    --own-bg:#eef2f2; --buy-bg:#e2f3f3; --decide-bg:#fcf3e1; --ordered-bg:#e4f5ed; --got-bg:#e8eefc;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,"PingFang TC","Noto Sans TC","Segoe UI",sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:0 18px 96px}

  /* header */
  header{position:relative;overflow:hidden;color:#fff;padding:40px 18px 56px;text-align:center;
        background:linear-gradient(135deg,#1f8e94 0%,#2b9da3 45%,#46c0b8 100%)}
  header::before{content:"";position:absolute;top:-90px;right:-60px;width:260px;height:260px;border-radius:50%;
        background:rgba(255,255,255,.10)}
  header::after{content:"";position:absolute;bottom:-120px;left:-50px;width:240px;height:240px;border-radius:50%;
        background:rgba(255,255,255,.07)}
  header .inner{position:relative;z-index:1;max-width:520px;margin:0 auto}
  .tabs{display:inline-flex;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);
        border-radius:999px;padding:4px;gap:3px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
  .tabs a{font-size:13px;font-weight:700;color:#fff;text-decoration:none;padding:8px 17px;border-radius:999px;
        display:inline-flex;align-items:center;gap:6px;opacity:.82;transition:.15s}
  .tabs a.on{background:#fff;color:var(--accent);opacity:1;box-shadow:0 2px 9px rgba(0,0,0,.14)}
  .tabs a:not(.on):hover{opacity:1;background:rgba(255,255,255,.12)}
  .tabs a svg{width:15px;height:15px}
  header h1{margin:0;font-size:28px;letter-spacing:1px;display:flex;gap:10px;align-items:center;justify-content:center;font-weight:800}
  header h1 svg{width:28px;height:28px}
  header .sub{font-size:13.5px;opacity:.92;margin-top:5px}
  .prog{margin-top:20px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);
        border-radius:16px;padding:14px 16px;backdrop-filter:blur(4px)}
  .prog-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;opacity:.95}
  .prog-top b{font-size:21px;font-weight:800}
  .prog-bar{height:9px;border-radius:99px;background:rgba(255,255,255,.25);margin:9px 0 11px;overflow:hidden}
  .prog-fill{height:100%;border-radius:99px;background:#fff;width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .prog-counts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .pcount{font-size:12px;font-weight:700;background:rgba(255,255,255,.18);border-radius:99px;padding:4px 11px;display:inline-flex;gap:5px;align-items:center}
  .pcount i{width:8px;height:8px;border-radius:3px;display:inline-block}

  /* filter bar */
  .filterbar{position:sticky;top:0;z-index:40;background:rgba(238,245,245,.92);backdrop-filter:blur(10px);
        border-bottom:1px solid var(--line);padding:11px 18px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;box-shadow:0 1px 3px rgba(40,120,125,.06)}
  .seg button{border:none;background:none;font:inherit;font-size:13px;font-weight:700;color:var(--sub);
        padding:7px 15px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.18s}
  .seg button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(43,157,163,.35)}
  .seg button svg{width:15px;height:15px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chips button{border:1px solid var(--line);background:#fff;font:inherit;font-size:12.5px;font-weight:600;
        color:var(--ink);padding:6px 13px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.18s}
  .chips button.on{border-color:var(--accent);background:var(--buy-bg);color:var(--accent)}
  .chips button svg{width:14px;height:14px}
  .addbtn{margin-left:auto;border:none;background:linear-gradient(135deg,#2b9da3,#46c0b8);color:#fff;font:inherit;font-weight:700;font-size:13px;
        padding:9px 16px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;box-shadow:0 3px 10px rgba(43,157,163,.32);transition:.18s}
  .addbtn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(43,157,163,.4)}
  .addbtn svg{width:15px;height:15px}

  /* group */
  .group{margin:30px 0 14px;display:flex;align-items:center;gap:11px}
  .group .gico{width:36px;height:36px;border-radius:11px;background:#fff;border:1px solid var(--line);
        display:flex;align-items:center;justify-content:center;color:var(--accent);box-shadow:var(--shadow)}
  .group .gico svg{width:19px;height:19px}
  .group .gname{font-size:18px;font-weight:800}
  .group .gbar{flex:1;height:6px;border-radius:99px;background:#dceaea;overflow:hidden;max-width:200px}
  .group .gbar>i{display:block;height:100%;background:var(--ordered);border-radius:99px;transition:width .4s}
  .group .gcnt{font-size:12.5px;font-weight:700;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:99px;padding:3px 11px}

  .grid{display:grid;gap:13px;grid-template-columns:1fr 1fr}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}

  /* card */
  .item{position:relative;display:flex;gap:13px;align-items:flex-start;background:var(--card);
        border:1px solid var(--line);border-radius:16px;padding:15px 16px 15px 18px;box-shadow:var(--shadow);
        transition:transform .18s,box-shadow .18s,border-color .18s;overflow:hidden;animation:rise .34s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .item::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--cc,var(--buy))}
  .item:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(40,120,125,.16);border-color:#bfe0e0}
  .item.s-own::before{background:var(--own)} .item.s-buy::before{background:var(--buy)}
  .item.s-decide::before{background:var(--decide)} .item.s-ordered::before{background:var(--ordered)} .item.s-got::before{background:var(--got)}
  .item .ico{width:46px;height:46px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .item.s-own .ico{background:var(--own-bg);color:var(--own)} .item.s-buy .ico{background:var(--buy-bg);color:var(--buy)}
  .item.s-decide .ico{background:var(--decide-bg);color:var(--decide)} .item.s-ordered .ico{background:var(--ordered-bg);color:var(--ordered)}
  .item.s-got .ico{background:var(--got-bg);color:var(--got)}
  .item .ico svg{width:24px;height:24px}
  .item .body{flex:1;min-width:0}
  .item .nm{font-weight:700;font-size:15.5px;padding-right:30px;letter-spacing:.2px}
  .item .meta{font-size:12px;color:var(--sub);margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .item .note{font-size:12.5px;color:#5a7173;margin-top:8px;background:#f3f9f9;border:1px solid #e4f0f0;border-radius:10px;padding:8px 10px;line-height:1.55}
  .badge{font-size:11px;font-weight:800;border-radius:7px;padding:3px 9px;white-space:nowrap}
  .b-own{background:var(--own-bg);color:#5b6b6c} .b-buy{background:var(--buy-bg);color:#1d8087}
  .b-decide{background:var(--decide-bg);color:#b07d11} .b-ordered{background:var(--ordered-bg);color:#1f8f63}
  .b-got{background:var(--got-bg);color:#3a63c4}
  .tag2{font-size:11px;color:var(--sub);background:#f1f6f6;border-radius:7px;padding:2px 8px}
  .item.done{opacity:.6}
  .item.done .nm{text-decoration:line-through;text-decoration-color:var(--sub)}
  .check{width:23px;height:23px;border:2px solid #cfe0e0;border-radius:8px;flex-shrink:0;margin-top:1px;
        display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:.15s;background:#fff}
  .check:hover{border-color:var(--ordered)}
  .item.done .check{background:var(--ordered);border-color:var(--ordered)}
  .check svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:.15s}
  .item.done .check svg{opacity:1;transform:scale(1)}
  .edit{position:absolute;top:12px;right:12px;border:none;background:none;color:#aebebe;cursor:pointer;padding:4px;border-radius:8px;transition:.15s}
  .edit:hover{background:var(--buy-bg);color:var(--accent)}
  .edit svg{width:16px;height:16px}

  .empty{grid-column:1/-1;color:var(--sub);font-size:13px;background:#fff;border:1px dashed #cfe0e0;
        border-radius:14px;padding:18px;text-align:center;display:flex;gap:7px;align-items:center;justify-content:center}
  .empty svg{width:16px;height:16px;opacity:.6}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin:26px 0 0;
        background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 16px;box-shadow:var(--shadow)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:30px}
  #status{text-align:center;color:var(--sub);font-size:13px;padding:40px}

  /* modal */
  #modal{position:fixed;inset:0;z-index:100;background:rgba(15,45,47,.45);display:none;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(2px)}
  #modal.show{display:flex}
  @media(min-width:560px){#modal{align-items:center;padding:18px}}
  .sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:440px;padding:22px;
        box-shadow:0 -10px 40px rgba(0,0,0,.2);animation:slideup .28s cubic-bezier(.2,.7,.3,1)}
  @media(min-width:560px){.sheet{border-radius:20px;animation:pop .22s ease}}
  @keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  @keyframes pop{from{transform:scale(.96);opacity:.6}to{transform:none;opacity:1}}
  .sheet h3{margin:0 0 16px;font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  .sheet h3 svg{width:19px;height:19px;color:var(--accent)}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;font:inherit;font-size:14px;padding:10px 12px;
        border:1.5px solid var(--line);border-radius:11px;background:#f7fbfb;color:var(--ink);transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .field textarea{min-height:62px;resize:vertical}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  .actions{display:flex;gap:9px;margin-top:20px;align-items:center}
  .actions button{font:inherit;font-weight:800;font-size:14px;padding:12px 16px;border-radius:13px;cursor:pointer;border:none;transition:.15s}
  .btn-save{background:linear-gradient(135deg,#2b9da3,#46c0b8);color:#fff;flex:1;box-shadow:0 3px 10px rgba(43,157,163,.3)}
  .btn-save:hover{transform:translateY(-1px)}
  .btn-cancel{background:#eef3f3;color:var(--ink)}
  .btn-del{background:#fdecea;color:#d05a52;padding:12px 13px}
  .btn-del svg{width:16px;height:16px;vertical-align:-3px}
</style>
</head>
<body>
<header>
  <div class="inner">
    <div class="tabs">
      <a class="on" href="index.html"><i data-lucide="house-plus"></i>新家佈置</a>
      <a href="moving.html"><i data-lucide="list-checks"></i>待辦清單</a>
      <a href="baby.html"><i data-lucide="baby"></i>寶寶待辦</a>
    </div>
    <h1><i data-lucide="house-plus"></i> 新家佈置清單</h1>
    <div class="sub">依區域 / 家俱・家電 篩選 · 雲端同步</div>
    <div class="prog">
      <div class="prog-top"><span>佈置完成度</span><b id="pct">0%</b></div>
      <div class="prog-bar"><div class="prog-fill" id="pfill"></div></div>
      <div class="prog-counts" id="stat">載入中…</div>
    </div>
  </div>
</header>

<div class="filterbar">
  <div class="seg" id="groupseg">
    <button data-group="area" class="on"><i data-lucide="layout-grid"></i>依區域</button>
    <button data-group="type"><i data-lucide="package"></i>依類型</button>
  </div>
  <div class="chips" id="typechips">
    <button data-type="all" class="on">全部</button>
    <button data-type="家俱"><i data-lucide="armchair"></i>家俱</button>
    <button data-type="家電"><i data-lucide="plug-zap"></i>家電</button>
  </div>
  <button class="addbtn" id="addbtn"><i data-lucide="plus"></i>新增</button>
</div>

<div class="wrap">
  <div id="status">載入中…</div>
  <div id="content"></div>

  <div class="legend" id="legend" style="display:none">
    <span><i class="dot" style="background:var(--own)"></i>原有</span>
    <span><i class="dot" style="background:var(--buy)"></i>待採購</span>
    <span><i class="dot" style="background:var(--decide)"></i>待決議</span>
    <span><i class="dot" style="background:var(--ordered)"></i>已下訂待取</span>
    <span><i class="dot" style="background:var(--got)"></i>已取貨</span>
    <span style="margin-left:auto">勾選＝完成 · ✏️ 編輯 · 雲端即時同步</span>
  </div>
  <footer>新家佈置 · 資料同步於 Supabase</footer>
</div>

<div id="modal">
  <div class="sheet">
    <h3 id="mtitle"><i data-lucide="plus"></i>新增物品</h3>
    <div class="field"><label>名稱</label><input id="f-name" placeholder="例：電視櫃"></div>
    <div class="row2">
      <div class="field"><label>區域</label><select id="f-area"></select></div>
      <div class="field"><label>類型</label><select id="f-type"><option>家俱</option><option>家電</option></select></div>
    </div>
    <div class="field"><label>狀態</label><select id="f-status">
      <option value="own">原有</option><option value="buy">待採購</option>
      <option value="decide">待決議</option><option value="ordered">已下訂待取</option>
      <option value="got">已取貨</option>
    </select></div>
    <div class="field"><label>備註（選填）</label><textarea id="f-note" placeholder="價格、連結、二選一說明…"></textarea></div>
    <div class="actions">
      <button class="btn-save" id="m-save">儲存</button>
      <button class="btn-cancel" id="m-cancel">取消</button>
      <button class="btn-del" id="m-del" style="display:none"><i data-lucide="trash-2"></i></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const SB_URL='https://veasxxuveykxycstcnfn.supabase.co';
  const SB_KEY='sb_publishable_O_1jnHO_5OunHwByeJDHdg_s_sztSkk';
  const API=SB_URL+'/rest/v1/home_items';
  const H={ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' };

  const AREAS=[
    {key:'玄關',icon:'door-open'},{key:'客廳',icon:'sofa'},{key:'廁所',icon:'bath'},{key:'廚房',icon:'cooking-pot'},
    {key:'主臥',icon:'bed-double'},{key:'次臥',icon:'baby'},{key:'和室',icon:'square'},{key:'陽台',icon:'fence'},
  ];
  const STATUS={own:{label:'原有',cls:'b-own'},buy:{label:'待採購',cls:'b-buy'},
    decide:{label:'待決議',cls:'b-decide'},ordered:{label:'已下訂待取',cls:'b-ordered'},got:{label:'已取貨',cls:'b-got'}};
  const TYPE_ICON={'家俱':'armchair','家電':'plug-zap'};
  const ICON={'沙發':'sofa','STOKKE 椅子':'armchair','桌子':'table','客廳多功能桌':'table-2','電視櫃':'gallery-horizontal-end',
    '電視':'tv','床架':'bed-double','微波爐':'microwave','洗衣機':'washing-machine','鞋櫃':'archive','升降桌':'table-2'};

  let ITEMS=[], groupMode='area', typeFilter='all', editingId=null;

  function iconFor(it){ if(ICON[it.name])return ICON[it.name]; if(/嬰兒床|床/.test(it.name))return 'baby';
    return it.type==='家電'?'plug-zap':'package'; }
  function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function escNl(s){return esc(s).replace(/\n/g,'<br>');}

  async function load(){
    try{
      const r=await fetch(API+'?select=*&order=sort_order,id',{headers:H});
      if(!r.ok) throw new Error(r.status);
      ITEMS=await r.json();
      document.getElementById('status').style.display='none';
      document.getElementById('legend').style.display='flex';
      render();
    }catch(e){
      document.getElementById('status').innerHTML='⚠️ 連線失敗：'+e.message+'<br>請確認 Supabase 設定';
    }
  }

  function itemCard(it){
    const st=STATUS[it.status]||STATUS.buy;
    return `<div class="item s-${it.status} ${it.done?'done':''}" data-id="${it.id}">
      <div class="check" data-act="toggle"><i data-lucide="check"></i></div>
      <div class="ico"><i data-lucide="${iconFor(it)}"></i></div>
      <div class="body">
        <div class="nm">${esc(it.name)}</div>
        <div class="meta"><span class="badge ${st.cls}">${st.label}</span><span class="tag2">${it.area}</span><span class="tag2">${it.type}</span></div>
        ${it.note?`<div class="note">${escNl(it.note)}</div>`:''}
      </div>
      <button class="edit" data-act="edit"><i data-lucide="pencil"></i></button>
    </div>`;
  }

  function groupHead(icon,name,list){
    const total=list.length, done=list.filter(i=>i.done).length;
    const pct=total?Math.round(done/total*100):0;
    const bar = total ? `<div class="gbar"><i style="width:${pct}%"></i></div>` : '';
    return `<div class="group"><div class="gico"><i data-lucide="${icon}"></i></div>
      <div class="gname">${name}</div>${bar}<div class="gcnt">${total?`${done}/${total}`:'0'} 項</div></div>`;
  }

  function render(){
    const items=ITEMS.filter(it=> typeFilter==='all'||it.type===typeFilter);
    let html='';
    if(groupMode==='area'){
      for(const a of AREAS){
        const list=items.filter(it=>it.area===a.key);
        html+=groupHead(a.icon,a.key,list);
        html+=`<div class="grid">${ list.length? list.map(itemCard).join('') : `<div class="empty"><i data-lucide="circle-dashed"></i>尚未規劃</div>` }</div>`;
      }
    } else {
      for(const t of ['家俱','家電']){
        if(typeFilter!=='all'&&typeFilter!==t) continue;
        const list=items.filter(it=>it.type===t);
        html+=groupHead(TYPE_ICON[t],t,list);
        html+=`<div class="grid">${ list.length? list.map(itemCard).join('') : `<div class="empty"><i data-lucide="circle-dashed"></i>無</div>` }</div>`;
      }
    }
    document.getElementById('content').innerHTML=html;
    bindCards();
    if(window.lucide) lucide.createIcons();
    renderStat();
  }

  function renderStat(){
    const total=ITEMS.length, buy=ITEMS.filter(i=>i.status==='buy').length,
      decide=ITEMS.filter(i=>i.status==='decide').length, d=ITEMS.filter(i=>i.done).length;
    const pct=total?Math.round(d/total*100):0;
    document.getElementById('pct').textContent=pct+'%';
    document.getElementById('pfill').style.width=pct+'%';
    document.getElementById('stat').innerHTML=
      `<span class="pcount"><i style="background:var(--buy)"></i>待採購 ${buy}</span>`+
      `<span class="pcount"><i style="background:var(--decide)"></i>待決議 ${decide}</span>`+
      `<span class="pcount"><i style="background:var(--ordered)"></i>已完成 ${d}/${total}</span>`;
  }

  function bindCards(){
    document.querySelectorAll('.item').forEach(el=>{
      const id=+el.dataset.id;
      el.querySelector('[data-act="toggle"]').addEventListener('click',e=>{e.stopPropagation();toggleDone(id,el);});
      el.querySelector('[data-act="edit"]').addEventListener('click',e=>{e.stopPropagation();openEdit(id);});
    });
  }

  async function toggleDone(id,el){
    const it=ITEMS.find(x=>x.id===id); if(!it)return;
    const nv=!it.done; it.done=nv;
    el.classList.toggle('done',nv);
    // update area/type progress bar without full re-render flash
    refreshGroupBars(); renderStat();
    const r=await fetch(API+'?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({done:nv})});
    if(!r.ok){ it.done=!nv; el.classList.toggle('done',!nv); refreshGroupBars(); renderStat(); alert('同步失敗，請重試'); }
  }
  function refreshGroupBars(){
    // recompute by re-rendering only headers' bars is complex; cheap path: full re-render is avoided,
    // so just recompute each group bar from current ITEMS by matching name text
    const items=ITEMS.filter(it=> typeFilter==='all'||it.type===typeFilter);
    document.querySelectorAll('.group').forEach(g=>{
      const name=g.querySelector('.gname').textContent;
      let list;
      if(groupMode==='area') list=items.filter(it=>it.area===name);
      else list=items.filter(it=>it.type===name);
      const total=list.length, done=list.filter(i=>i.done).length, pct=total?Math.round(done/total*100):0;
      const bar=g.querySelector('.gbar>i'); if(bar) bar.style.width=pct+'%';
      const cnt=g.querySelector('.gcnt'); if(cnt) cnt.textContent=(total?`${done}/${total}`:'0')+' 項';
    });
  }

  const modal=document.getElementById('modal');
  function fillAreaSelect(){ document.getElementById('f-area').innerHTML=AREAS.map(a=>`<option>${a.key}</option>`).join(''); }
  function openAdd(){
    editingId=null;
    document.getElementById('mtitle').innerHTML='<i data-lucide="plus"></i>新增物品';
    document.getElementById('f-name').value='';
    document.getElementById('f-area').value='客廳';
    document.getElementById('f-type').value='家俱';
    document.getElementById('f-status').value='buy';
    document.getElementById('f-note').value='';
    document.getElementById('m-del').style.display='none';
    modal.classList.add('show'); if(window.lucide) lucide.createIcons();
  }
  function openEdit(id){
    const it=ITEMS.find(x=>x.id===id); if(!it)return;
    editingId=id;
    document.getElementById('mtitle').innerHTML='<i data-lucide="pencil"></i>編輯物品';
    document.getElementById('f-name').value=it.name;
    document.getElementById('f-area').value=it.area;
    document.getElementById('f-type').value=it.type;
    document.getElementById('f-status').value=it.status;
    document.getElementById('f-note').value=it.note||'';
    document.getElementById('m-del').style.display='inline-flex';
    modal.classList.add('show'); if(window.lucide) lucide.createIcons();
  }
  function closeModal(){ modal.classList.remove('show'); }

  async function save(){
    const payload={
      name:document.getElementById('f-name').value.trim(),
      area:document.getElementById('f-area').value,
      type:document.getElementById('f-type').value,
      status:document.getElementById('f-status').value,
      note:document.getElementById('f-note').value.trim()||null,
    };
    if(!payload.name){ alert('請輸入名稱'); return; }
    let r;
    if(editingId){
      r=await fetch(API+'?id=eq.'+editingId,{method:'PATCH',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(payload)});
    }else{
      payload.sort_order=(Math.max(0,...ITEMS.map(i=>i.sort_order||0))+1);
      r=await fetch(API,{method:'POST',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(payload)});
    }
    if(!r.ok){ alert('儲存失敗：'+r.status); return; }
    const data=await r.json(); const row=Array.isArray(data)?data[0]:data;
    if(editingId){ const i=ITEMS.findIndex(x=>x.id===editingId); ITEMS[i]={...ITEMS[i],...row}; }
    else { ITEMS.push(row); }
    closeModal(); render();
  }
  async function del(){
    if(!editingId||!confirm('確定刪除這個物品？'))return;
    const r=await fetch(API+'?id=eq.'+editingId,{method:'DELETE',headers:H});
    if(!r.ok){ alert('刪除失敗：'+r.status); return; }
    ITEMS=ITEMS.filter(x=>x.id!==editingId); closeModal(); render();
  }

  document.getElementById('addbtn').addEventListener('click',openAdd);
  document.getElementById('m-save').addEventListener('click',save);
  document.getElementById('m-cancel').addEventListener('click',closeModal);
  document.getElementById('m-del').addEventListener('click',del);
  modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
  document.querySelectorAll('#groupseg button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#groupseg button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); groupMode=b.dataset.group; render();
  }));
  document.querySelectorAll('#typechips button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#typechips button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); typeFilter=b.dataset.type; render();
  }));

  fillAreaSelect();
  if(window.lucide) lucide.createIcons();
  load();
</script>
</body>
</html>
