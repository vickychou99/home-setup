<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶寶待辦事項</title>
<style>
  :root{
    --bg:#eef5f5; --card:#ffffff; --ink:#1f3437; --sub:#6f8a8c;
    --accent:#2b9da3; --accent2:#46c0b8; --line:#dcebeb; --shadow:0 8px 26px rgba(40,120,125,.10);
    --done:#36b27a; --done-bg:#e4f5ed;
    --todo:#94a3a4; --todo-bg:#eef2f2; --doing:#e0a82e; --doing-bg:#fcf3e1;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,"PingFang TC","Noto Sans TC","Segoe UI",sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:0 18px 96px}

  header{position:relative;overflow:hidden;color:#fff;padding:40px 18px 50px;text-align:center;
        background:linear-gradient(135deg,#1f8e94 0%,#2b9da3 45%,#46c0b8 100%)}
  header::before{content:"";position:absolute;top:-90px;right:-60px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.10)}
  header::after{content:"";position:absolute;bottom:-120px;left:-50px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.07)}
  header .inner{position:relative;z-index:1;max-width:520px;margin:0 auto}
  .tabs{display:inline-flex;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);
        border-radius:999px;padding:4px;gap:3px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
  .tabs a{font-size:13px;font-weight:700;color:#fff;text-decoration:none;padding:8px 15px;border-radius:999px;
        display:inline-flex;align-items:center;gap:6px;opacity:.82;transition:.15s}
  .tabs a.on{background:#fff;color:var(--accent);opacity:1;box-shadow:0 2px 9px rgba(0,0,0,.14)}
  .tabs a:not(.on):hover{opacity:1;background:rgba(255,255,255,.12)}
  .tabs a svg{width:15px;height:15px}
  header h1{margin:0;font-size:27px;letter-spacing:1px;display:flex;gap:10px;align-items:center;justify-content:center;font-weight:800}
  header h1 svg{width:27px;height:27px}
  header .sub{font-size:13.5px;opacity:.92;margin-top:5px}
  .prog{margin-top:20px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:14px 16px;backdrop-filter:blur(4px)}
  .prog-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;opacity:.95}
  .prog-top b{font-size:21px;font-weight:800}
  .prog-bar{height:9px;border-radius:99px;background:rgba(255,255,255,.25);margin:9px 0 0;overflow:hidden}
  .prog-fill{height:100%;border-radius:99px;background:#fff;width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
  #progsub{margin-top:11px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .pcount{font-size:12px;font-weight:700;background:rgba(255,255,255,.18);border-radius:99px;padding:5px 12px;display:inline-flex;gap:5px;align-items:center;cursor:pointer;transition:.15s}
  .pcount:hover{background:rgba(255,255,255,.32)}
  .pcount i{width:8px;height:8px;border-radius:3px;display:inline-block}

  .bar{position:sticky;top:0;z-index:40;background:rgba(238,245,245,.92);backdrop-filter:blur(10px);
        border-bottom:1px solid var(--line);padding:11px 18px;display:flex;gap:10px;align-items:center}
  .addbtn{margin-left:auto;border:none;background:linear-gradient(135deg,#2b9da3,#46c0b8);color:#fff;font:inherit;font-weight:700;font-size:13px;
        padding:9px 16px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;box-shadow:0 3px 10px rgba(43,157,163,.32);transition:.18s}
  .addbtn:hover{transform:translateY(-1px)}
  .addbtn svg{width:15px;height:15px}
  .gcalbtn{border:1px solid var(--line);background:#fff;color:var(--accent);font:inherit;font-weight:700;font-size:12.5px;
        padding:9px 14px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.18s}
  .gcalbtn:hover{background:var(--done-bg)}
  .gcalbtn.on{background:var(--done-bg);border-color:var(--done);color:#1f8f63}
  .gcalbtn svg{width:15px;height:15px}
  .gpanel{margin-top:20px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
  .gpanel .ghead{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;margin-bottom:4px}
  .gpanel .ghead svg{width:18px;height:18px;color:var(--accent)}
  .gpanel .gsync{margin-left:auto;border:none;background:linear-gradient(135deg,#2b9da3,#46c0b8);color:#fff;font:inherit;font-weight:700;font-size:12px;
        padding:7px 13px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .gpanel .gsync svg{width:14px;height:14px}
  .gpanel .ghint{font-size:12px;color:var(--sub);margin-bottom:10px}
  .gevent{display:flex;gap:10px;align-items:center;padding:8px 0;border-top:1px dashed var(--line);font-size:13.5px}
  .gevent:first-of-type{border-top:none}
  .gevent .gdate{font-weight:700;color:var(--accent);font-size:12.5px;min-width:88px;flex-shrink:0}

  .list{margin-top:22px}
  .mgroup{margin:26px 0 13px;display:flex;align-items:center;gap:11px;scroll-margin-top:70px}
  .mgroup:first-child{margin-top:4px}
  .mico{width:36px;height:36px;border-radius:11px;background:#fff;border:1px solid var(--line);
        display:flex;align-items:center;justify-content:center;color:var(--accent);box-shadow:var(--shadow)}
  .mico svg{width:19px;height:19px}
  .mico.s-doing{color:var(--doing)} .mico.s-todo{color:var(--todo)} .mico.s-done{color:var(--done)}
  .mname{font-size:18px;font-weight:800}
  .mcnt{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:99px;padding:3px 12px}
  .mlist{display:flex;flex-direction:column;gap:12px}
  .todo{position:relative;display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
        border-radius:16px;padding:16px 16px 16px 18px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s,border-color .18s;
        overflow:hidden;animation:rise .34s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .todo::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--todo)}
  .todo.s-doing::before{background:var(--doing)} .todo.s-done::before{background:var(--done)}
  .todo:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(40,120,125,.16);border-color:#bfe0e0}
  .check{position:relative;width:25px;height:25px;border:2px solid #cfe0e0;border-radius:50%;flex-shrink:0;margin-top:1px;
        display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:.15s;background:#fff}
  .check:hover{border-color:var(--doing)}
  .check svg{width:15px;height:15px;opacity:0;transform:scale(.5);transition:.15s}
  .todo.s-doing .check{border-color:var(--doing)}
  .todo.s-doing .check::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--doing)}
  .todo.s-done .check{background:var(--done);border-color:var(--done)}
  .todo.s-done .check svg{opacity:1;transform:scale(1)}
  .badge{font-size:11px;font-weight:800;border-radius:7px;padding:3px 9px;white-space:nowrap}
  .b-todo{background:var(--todo-bg);color:#5b6b6c} .b-doing{background:var(--doing-bg);color:#b07d11} .b-done{background:var(--done-bg);color:#1f8f63}
  .todo .body{flex:1;min-width:0}
  .todo .task{font-weight:700;font-size:16px;padding-right:30px;letter-spacing:.2px}
  .todo .tmeta{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .datepill{font-size:11px;font-weight:700;color:#3a63c4;background:#e8eefc;border-radius:7px;padding:3px 9px;display:inline-flex;align-items:center;gap:4px}
  .datepill svg{width:12px;height:12px}
  .todo.s-done .task{text-decoration:line-through;text-decoration-color:var(--sub);color:var(--sub)}
  .todo .note{font-size:13px;color:#5a7173;margin-top:7px;background:#f3f9f9;border:1px solid #e4f0f0;border-radius:10px;padding:8px 10px;line-height:1.55;white-space:pre-wrap}
  .edit{position:absolute;top:13px;right:13px;border:none;background:none;color:#aebebe;cursor:pointer;padding:4px;border-radius:8px;transition:.15s}
  .edit:hover{background:var(--done-bg);color:var(--accent)}
  .edit svg{width:16px;height:16px}
  .todo.s-done{opacity:.66}

  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:30px}
  #status{text-align:center;color:var(--sub);font-size:13px;padding:40px}

  #modal{position:fixed;inset:0;z-index:100;background:rgba(15,45,47,.45);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
  #modal.show{display:flex}
  @media(min-width:560px){#modal{align-items:center;padding:18px}}
  .sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:440px;padding:22px;box-shadow:0 -10px 40px rgba(0,0,0,.2);animation:slideup .28s cubic-bezier(.2,.7,.3,1)}
  @media(min-width:560px){.sheet{border-radius:20px;animation:pop .22s ease}}
  @keyframes slideup{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  @keyframes pop{from{transform:scale(.96);opacity:.6}to{transform:none;opacity:1}}
  .sheet h3{margin:0 0 16px;font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  .sheet h3 svg{width:19px;height:19px;color:var(--accent)}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;font:inherit;font-size:16px;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;background:#f7fbfb;color:var(--ink);transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .field textarea{min-height:64px;resize:vertical}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  .actions{display:flex;gap:9px;margin-top:20px;align-items:center}
  .actions button{font:inherit;font-weight:800;font-size:14px;padding:12px 16px;border-radius:13px;cursor:pointer;border:none;transition:.15s}
  .btn-save{background:linear-gradient(135deg,#2b9da3,#46c0b8);color:#fff;flex:1;box-shadow:0 3px 10px rgba(43,157,163,.3)}
  .btn-save:hover{transform:translateY(-1px)}
  .btn-cancel{background:#eef3f3;color:var(--ink)}
  .btn-del{background:#fdecea;color:#d05a52;padding:12px 13px}
  .btn-del svg{width:16px;height:16px;vertical-align:-3px}
  #gotop{position:fixed;right:18px;bottom:22px;z-index:60;width:46px;height:46px;border-radius:50%;border:none;
        background:var(--accent);color:#fff;font-size:22px;cursor:pointer;box-shadow:0 6px 18px rgba(43,157,163,.45);
        opacity:0;pointer-events:none;transition:opacity .25s,transform .2s}
  #gotop.show{opacity:1;pointer-events:auto}
  #gotop:hover{transform:translateY(-3px)}
  .notelink{color:var(--accent);text-decoration:underline;word-break:break-all}
</style>
</head>
<body>
<button id="gotop" title="回到頂部" aria-label="回到頂部">↑</button>

<header>
  <div class="inner">
    <div class="tabs">
      <a href="index.html"><i data-lucide="house-plus"></i>新家佈置</a>
      <a href="moving.html"><i data-lucide="list-checks"></i>待辦清單</a>
      <a class="on" href="baby.html"><i data-lucide="baby"></i>寶寶待辦</a>
    </div>
    <h1><i data-lucide="baby"></i> 寶寶待辦事項</h1>
    <div class="sub">點圈圈切換：待辦 → 處理中 → 完成</div>
    <div class="prog">
      <div class="prog-top"><span>完成進度</span><b id="pct">0%</b></div>
      <div class="prog-bar"><div class="prog-fill" id="pfill"></div></div>
      <div id="progsub"></div>
    </div>
  </div>
</header>

<div class="bar">
  <button class="gcalbtn" id="gcal-btn"><i data-lucide="calendar"></i>連結 Google 行事曆</button>
  <button class="gcalbtn" id="gcal-sync" style="display:none"><i data-lucide="refresh-cw"></i>同步處理中待辦</button>
  <button class="addbtn" id="addbtn"><i data-lucide="plus"></i>新增待辦</button>
</div>

<div class="wrap">
  <div id="status">載入中…</div>
  <div class="list" id="list"></div>
  <footer>寶寶待辦 · 資料同步於 Supabase</footer>
</div>

<div id="modal">
  <div class="sheet">
    <h3 id="mtitle"><i data-lucide="plus"></i>新增待辦</h3>
    <div class="field"><label>待辦事項</label><input id="f-task" placeholder="例：確認要入籍到哪裡"></div>
    <div class="row2">
      <div class="field"><label>狀態</label><select id="f-status">
        <option value="todo">待辦</option><option value="doing">處理中</option><option value="done">完成</option>
      </select></div>
      <div class="field"><label>日期（選填）</label><input id="f-date" type="date"></div>
    </div>
    <div class="field"><label>備註（選填）</label><textarea id="f-note" placeholder="醫院、聯絡人、提醒…"></textarea></div>
    <div class="actions">
      <button class="btn-save" id="m-save">儲存</button>
      <button class="btn-cancel" id="m-cancel">取消</button>
      <button class="btn-del" id="m-del" style="display:none"><i data-lucide="trash-2"></i></button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script src="gcal.js?v=4"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const SB_URL='https://veasxxuveykxycstcnfn.supabase.co';
  const SB_KEY='sb_publishable_O_1jnHO_5OunHwByeJDHdg_s_sztSkk';
  const API=SB_URL+'/rest/v1/baby_todos';
  const H={ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' };

  let ITEMS=[], editingId=null;
  const STATUS={todo:{label:'待辦',cls:'b-todo'},doing:{label:'處理中',cls:'b-doing'},done:{label:'完成',cls:'b-done'}};
  const NEXT={todo:'doing',doing:'done',done:'todo'};
  function st(it){ return it.status || (it.done?'done':'todo'); }
  function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function linkify(s){const e=t=>(t||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));const re=/(https?:\/\/[^\s]+|www\.[^\s]+)/g;let out='',last=0,m;s=s||'';while((m=re.exec(s))){out+=e(s.slice(last,m.index));let u=m[0],tr='';const tm=u.match(/[)\]\.,;!?，。、！？]+$/);if(tm){tr=tm[0];u=u.slice(0,-tr.length);}const href=u.startsWith('www.')?'https://'+u:u;out+='<a href="'+e(href)+'" target="_blank" rel="noopener" class="notelink" onclick="event.stopPropagation()">'+e(u)+'</a>'+e(tr);last=m.index+m[0].length;}out+=e(s.slice(last));return out;}

  async function load(){
    try{
      const r=await fetch(API+'?select=*&order=sort_order,id',{headers:H});
      if(!r.ok) throw new Error(r.status);
      ITEMS=await r.json();
      document.getElementById('status').style.display='none';
      render();
    }catch(e){ document.getElementById('status').innerHTML='⚠️ 連線失敗：'+e.message; }
  }

  const SGROUPS=[
    {key:'doing',label:'處理中',icon:'loader'},
    {key:'todo', label:'待辦',  icon:'circle'},
    {key:'done', label:'完成',  icon:'check-circle-2'},
  ];
  // 排序：有確定日期者照日期升冪、無日期放最後
  function todoSort(a,b){
    const ad=a.due_date||'', bd=b.due_date||'';
    if(ad && bd) return ad<bd?-1:ad>bd?1:0;
    if(ad && !bd) return -1;
    if(!ad && bd) return 1;
    return ((a.sort_order||0)-(b.sort_order||0)) || (a.id-b.id);
  }
  function card(it){
    return `<div class="todo s-${st(it)}" data-id="${it.id}">
      <div class="check" data-act="toggle" title="點一下切換狀態"><i data-lucide="check"></i></div>
      <div class="body">
        <div class="task">${esc(it.task)}</div>
        ${it.due_date?`<div class="tmeta"><span class="datepill"><i data-lucide="calendar"></i>${it.due_date}</span></div>`:''}
        ${it.note?`<div class="note">${linkify(it.note)}</div>`:''}
      </div>
      <button class="edit" data-act="edit"><i data-lucide="pencil"></i></button>
    </div>`;
  }
  function render(){
    if(!ITEMS.length){
      document.getElementById('list').innerHTML=`<div style="text-align:center;color:var(--sub);padding:30px">尚無待辦，點右上「新增待辦」開始 ✏️</div>`;
      renderProg(); return;
    }
    let html='';
    for(const g of SGROUPS){
      const list=ITEMS.filter(i=>st(i)===g.key).sort(todoSort);
      if(!list.length) continue;
      html+=`<div class="mgroup" id="grp-${g.key}"><div class="mico s-${g.key}"><i data-lucide="${g.icon}"></i></div>
        <div class="mname">${g.label}</div><div class="mcnt">${list.length}</div></div>`;
      html+=`<div class="mlist">${list.map(card).join('')}</div>`;
    }
    document.getElementById('list').innerHTML=html;
    bind(); if(window.lucide) lucide.createIcons(); renderProg();
  }
  function renderProg(){
    const total=ITEMS.length, d=ITEMS.filter(i=>st(i)==='done').length,
      doing=ITEMS.filter(i=>st(i)==='doing').length, pct=total?Math.round(d/total*100):0;
    document.getElementById('pct').textContent=pct+'%';
    document.getElementById('pfill').style.width=pct+'%';
    const sub=document.getElementById('progsub');
    if(sub) sub.innerHTML=`<span class="pcount" data-grp="doing"><i style="background:var(--doing)"></i>處理中 ${doing}</span>`+
      `<span class="pcount" data-grp="todo"><i style="background:var(--todo)"></i>待辦 ${total-d-doing}</span>`+
      `<span class="pcount" data-grp="done"><i style="background:var(--done)"></i>完成 ${d}</span>`;
  }
  function bind(){
    document.querySelectorAll('.todo').forEach(el=>{
      const id=+el.dataset.id;
      el.querySelector('[data-act="toggle"]').addEventListener('click',e=>{e.stopPropagation();cycle(id,el);});
      el.querySelector('[data-act="edit"]').addEventListener('click',e=>{e.stopPropagation();openEdit(id);});
    });
  }
  async function cycle(id,el){
    const it=ITEMS.find(x=>x.id===id); if(!it)return;
    const prev=st(it), ns=NEXT[prev];
    it.status=ns; it.done=(ns==='done'); render();   // 重繪以移到對應分組
    const r=await fetch(API+'?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({status:ns,done:ns==='done'})});
    if(!r.ok){ it.status=prev; it.done=(prev==='done'); render(); alert('同步失敗，請重試'); }
  }

  const modal=document.getElementById('modal');
  function openAdd(){ editingId=null;
    document.getElementById('mtitle').innerHTML='<i data-lucide="plus"></i>新增待辦';
    document.getElementById('f-task').value=''; document.getElementById('f-note').value='';
    document.getElementById('f-status').value='todo'; document.getElementById('f-date').value='';
    document.getElementById('m-del').style.display='none'; modal.classList.add('show'); if(window.lucide)lucide.createIcons();
  }
  function openEdit(id){ const it=ITEMS.find(x=>x.id===id); if(!it)return; editingId=id;
    document.getElementById('mtitle').innerHTML='<i data-lucide="pencil"></i>編輯待辦';
    document.getElementById('f-task').value=it.task; document.getElementById('f-note').value=it.note||'';
    document.getElementById('f-status').value=st(it); document.getElementById('f-date').value=it.due_date||'';
    document.getElementById('m-del').style.display='inline-flex'; modal.classList.add('show'); if(window.lucide)lucide.createIcons();
  }
  function close(){ modal.classList.remove('show'); }
  async function save(){
    const s=document.getElementById('f-status').value;
    const payload={ task:document.getElementById('f-task').value.trim(), note:document.getElementById('f-note').value.trim()||null,
      status:s, done:(s==='done'), due_date:document.getElementById('f-date').value||null };
    if(!payload.task){ alert('請輸入待辦事項'); return; }
    let r;
    if(editingId){ r=await fetch(API+'?id=eq.'+editingId,{method:'PATCH',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(payload)}); }
    else { payload.sort_order=(Math.max(0,...ITEMS.map(i=>i.sort_order||0))+1);
      r=await fetch(API,{method:'POST',headers:{...H,Prefer:'return=representation'},body:JSON.stringify(payload)}); }
    if(!r.ok){ alert('儲存失敗：'+r.status); return; }
    const row=(await r.json())[0];
    if(editingId){ const i=ITEMS.findIndex(x=>x.id===editingId); ITEMS[i]={...ITEMS[i],...row}; } else { ITEMS.push(row); }
    close(); render();
  }
  async function del(){
    if(!editingId||!confirm('確定刪除這個待辦？'))return;
    const r=await fetch(API+'?id=eq.'+editingId,{method:'DELETE',headers:H});
    if(!r.ok){ alert('刪除失敗：'+r.status); return; }
    ITEMS=ITEMS.filter(x=>x.id!==editingId); close(); render();
  }

  document.getElementById('addbtn').addEventListener('click',openAdd);
  document.getElementById('m-save').addEventListener('click',save);
  document.getElementById('m-cancel').addEventListener('click',close);
  document.getElementById('m-del').addEventListener('click',del);
  modal.addEventListener('click',e=>{if(e.target===modal)close();});

  if(window.lucide) lucide.createIcons();
  load();

  // 點上方膠囊 → 捲動到對應狀態區塊
  document.getElementById('progsub').addEventListener('click',e=>{
    const p=e.target.closest('.pcount'); if(!p)return;
    const el=document.getElementById('grp-'+p.dataset.grp);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  });

  // ---- Google 行事曆串接 ----
  const gbtn=document.getElementById('gcal-btn');
  const gsyncBtn=document.getElementById('gcal-sync');
  function gUI(connected){
    if(connected){ gbtn.innerHTML='<i data-lucide="calendar-check"></i>行事曆已連結'; gbtn.classList.add('on');
      gsyncBtn.style.display='inline-flex'; }
    else { gbtn.innerHTML='<i data-lucide="calendar"></i>連結 Google 行事曆'; gbtn.classList.remove('on'); gsyncBtn.style.display='none'; }
    if(window.lucide) lucide.createIcons();
  }
  GCAL.init(gUI);
  gbtn.addEventListener('click',()=>{ if(!GCAL.connected()) GCAL.connect(); });
  gsyncBtn.addEventListener('click',syncDoing);

  async function syncDoing(){
    if(!GCAL.connected()){ GCAL.connect(); return; }
    const targets=ITEMS.filter(i=> st(i)==='doing' && i.due_date);
    if(!targets.length){ alert('沒有「處理中且有日期」的待辦可同步'); return; }
    let ok=0;
    for(const it of targets){
      try{
        if(it.gcal_event_id){ await GCAL.updateEvent(it.gcal_event_id, it.task, it.due_date, it.note||''); }
        else{
          const ev=await GCAL.createEvent(it.task, it.due_date, it.note||'');
          await fetch(API+'?id=eq.'+it.id,{method:'PATCH',headers:H,body:JSON.stringify({gcal_event_id:ev.id})});
          it.gcal_event_id=ev.id;
        }
        ok++;
      }catch(e){ console.warn(e); }
    }
    alert('已同步 '+ok+' 筆到 Google 行事曆');
  }

  // 回到頂部
  const _gotop=document.getElementById('gotop');
  addEventListener('scroll',()=>{_gotop.classList.toggle('show',scrollY>400)});
  _gotop.addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));

</script>
</body>
</html>
